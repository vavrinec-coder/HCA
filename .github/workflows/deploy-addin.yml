name: Deploy Excel add-in

on:
  push:
    branches:
      - main
    paths:
      - "excel-addin/**"
      - ".github/workflows/deploy-addin.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: excel-addin/package-lock.json

      - name: Install
        working-directory: excel-addin
        run: npm ci

      - name: Build
        working-directory: excel-addin
        env:
          VITE_BACKEND_URL: https://hca-calc-engine.onrender.com
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: excel-addin/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
