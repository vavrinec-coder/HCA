services:
  - type: web
    name: hca-calc-engine
    runtime: python
    plan: free
    rootDir: calc-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: "*"
